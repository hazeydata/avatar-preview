<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <style>
      .logo-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 500;
        font-size: 32px;
        fill: #4a90a4;
        letter-spacing: 0.5px;
      }
      .logo-dot {
        font-family: 'Inter', sans-serif;
        font-weight: 400;
        font-size: 32px;
        fill: #4a90a4;
      }
    </style>
  </defs>
  
  <!-- Dark background circle for LinkedIn -->
  <circle cx="200" cy="200" r="200" fill="#0a1628"/>
  
  <!-- HazeyData text -->
  <text x="200" y="210" text-anchor="middle" class="logo-text">HAZEYDATA</text>
  
  <!-- Bullet point -->
  <text x="335" y="210" text-anchor="middle" class="logo-dot">•</text>
</svg>